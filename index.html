<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Emin ❤️ İdil</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffb6c1, #ffc0cb);
      overflow-x: hidden;
      text-align: center;
      color: #fff;
    }

    h1 {
      margin-top: 30px;
      font-size: 40px;
    }

    h2 {
      margin-top: 10px;
      font-weight: normal;
      font-size: 18px;
    }

    .container {
      margin-top: 30px;
    }

    .counter {
      background: rgba(255,255,255,0.2);
      margin: 15px auto;
      padding: 15px;
      border-radius: 15px;
      width: 300px;
      backdrop-filter: blur(10px);
    }

    .counter h3 {
      margin: 0;
      font-size: 16px;
    }

    .number {
      font-size: 28px;
      margin-top: 5px;
      font-weight: bold;
    }

    .note {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 5px;
    }

    /* Kalpler */
    .heart {
      position: fixed;
      top: -10px;
      font-size: 20px;
      animation: fall linear infinite;
      color: #ff4d88;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh);
      }
    }
  </style>
</head>
<body>

  <h1>Emin 💗 İdil</h1>
  <h2>Bize özel tarihler</h2>

  <div class="container">

    <div class="counter">
      <h3>💑 Sevgili olduğumuzdan beri</h3>
      <div class="number" id="loveDays"></div>
      <div class="note">01.01.2026</div>
    </div>

    <div class="counter">
      <h3>🤝 Tanıştığımızdan beri</h3>
      <div class="number" id="meetDays"></div>
      <div class="note">15.11.2025</div>
    </div>

    <div class="counter">
      <h3>👀 Seni ilk gördüğümden beri</h3>
      <div class="number" id="firstSeeDays"></div>
      <div class="note">12.11.2025</div>
    </div>

    <div class="counter">
      <h3>💘 İlk buluşmamızdan beri</h3>
      <div class="number" id="dateDays"></div>
      <div class="note">09.01.2026</div>
    </div>

    <div class="counter">
      <h3>🎂 İdil'in doğum gününe kalan</h3>
      <div class="number" id="idilBday"></div>
      <div class="note">26 Ekim (geri sayım)</div>
    </div>

    <div class="counter">
      <h3>🎂 Emin'in doğum gününe kalan</h3>
      <div class="number" id="eminBday"></div>
      <div class="note">10 Ağustos (geri sayım)</div>
    </div>

  </div>

<script>
function daysSince(dateString) {
  const now = new Date();
  const past = new Date(dateString);
  const diff = now - past;
  return Math.floor(diff / (1000 * 60 * 60 * 24));
}

function daysUntil(month, day) {
  const now = new Date();
  let year = now.getFullYear();
  let target = new Date(year, month - 1, day);

  if (target < now) {
    target = new Date(year + 1, month - 1, day);
  }

  const diff = target - now;
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function updateCounters() {
  document.getElementById("loveDays").innerText = daysSince("2026-01-01") + " gün";
  document.getElementById("meetDays").innerText = daysSince("2025-11-15") + " gün";
  document.getElementById("firstSeeDays").innerText = daysSince("2025-11-12") + " gün";
  document.getElementById("dateDays").innerText = daysSince("2026-01-09") + " gün";

  document.getElementById("idilBday").innerText = daysUntil(10, 26) + " gün";
  document.getElementById("eminBday").innerText = daysUntil(8, 10) + " gün";
}

updateCounters();
setInterval(updateCounters, 1000);

/* Kalp üret */
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerText = "💗";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (3 + Math.random() * 5) + "s";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 8000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
